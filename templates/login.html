{% extends "base_auth.html" %}

{% block content %}
{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Login As</label>
        <select class="form-select" name="role" id="role-select">
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
            <option value="hr">HR</option>
            <option value="admin">Admin</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label" id="login-id-label">Employee ID</label>
        <input type="text" class="form-control" name="emp_id" required placeholder="Enter your employee ID" id="login-id-input">
    </div>
    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required placeholder="Enter your password">
    </div>
    <button type="submit" class="btn btn-primary-gradient w-100 py-2">Sign In</button>
</form>

<hr>
<p class="text-center mb-0 text-secondary">
    New admin? <a href="/admin_signup" class="text-decoration-none fw-bold">Register here</a>
</p>
{% endblock %}

{% block page_scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const body = document.body;
        const roleSelect = document.getElementById('role-select');
        const idLabel = document.getElementById('login-id-label');
        const idInput = document.getElementById('login-id-input');

        function applyRoleUI() {
            const selectedRole = roleSelect.value;
            if (selectedRole === 'admin') {
                body.classList.remove('login-role-employee');
                body.classList.add('login-role-admin');
                idLabel.textContent = 'Admin Username';
                idInput.placeholder = 'Enter your admin username';
            } else {
                body.classList.remove('login-role-admin');
                body.classList.add('login-role-employee');
                idLabel.textContent = selectedRole === 'employee' ? 'Employee ID' : 'Employee ID / Username';
                idInput.placeholder = selectedRole === 'employee' ? 'Enter your employee ID' : 'Enter your login ID';
            }
        }

        roleSelect.addEventListener('change', applyRoleUI);
        applyRoleUI();
    });
</script>
{% endblock %}
