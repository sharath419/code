{% extends "base_auth.html" %}

{% block content %}
{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Admin Username *</label>
        <input type="text" class="form-control" name="username" required placeholder="Choose a unique username">
    </div>
    <div class="mb-4">
        <label class="form-label">Password *</label>
        <input type="password" class="form-control" name="password" required placeholder="Create a strong password">
    </div>
    <button type="submit" class="btn btn-success-gradient w-100 py-2 mb-3">
        Create Admin Account
    </button>
</form>

<hr>
<p class="text-center mb-0 text-secondary">
    Already have an account? <a href="/login" class="text-decoration-none fw-bold">Sign in here</a>
</p>
{% endblock %}
